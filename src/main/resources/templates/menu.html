<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAÍCES - Portal Bio-Nutricional</title>

    <link rel="manifest" href="manifest_menu.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#01120a">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --bio-oro: #ffd700;
            --bio-aqua: #00f0ff;
            --borde-madera: #2d180b;
            --v-profundo: #01120a;
            --resplandor-divino: 0 0 35px rgba(255, 215, 0, 0.6);
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--v-profundo);
            background-image:
                linear-gradient(rgba(1, 10, 5, 0.2), rgba(1, 10, 5, 0.5)),
                url('https://res.cloudinary.com/doi0o3hlr/image/upload/v1774759858/Gemini_Generated_Image_2ocvdw2ocvdw2ocv_ixqdsz.png');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #fff; min-height: 100vh; margin: 0; overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        #pantalla-inicio {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            overflow: hidden;
        }

        .fondo-puerta-viva {
            position: absolute; top: -5%; left: -5%; width: 110%; height: 110%;
            background-color: #050505;
            background-image: linear-gradient(rgba(1, 18, 10, 0.2), rgba(1, 18, 10, 0.6)), url('puerta-magica.jpg');
            background-size: cover; background-position: center;
            z-index: 1;
            animation: respiracionMagica 6s infinite alternate ease-in-out;
            transition: transform 1.5s cubic-bezier(0.5, 0, 0.2, 1), filter 1.5s ease-in;
        }

        @keyframes respiracionMagica {
            0% { transform: scale(1); filter: brightness(0.95) contrast(1.05) hue-rotate(0deg); }
            100% { transform: scale(1.04); filter: brightness(1.2) contrast(1.15) hue-rotate(8deg); }
        }

        .contenido-inicio {
            position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center;
            transition: opacity 0.5s ease-out, transform 0.5s ease-out;
            width: 100%;
        }

        /* NUEVOS BOTONES DE NODO (PAÍSES) */
        .btn-nodo {
            background: radial-gradient(circle, rgba(10, 20, 15, 0.8) 0%, rgba(0, 0, 0, 0.9) 100%);
            backdrop-filter: blur(10px); color: var(--bio-oro); border: 2px solid var(--bio-oro);
            padding: 15px 20px; font-family: 'Orbitron'; font-size: 1.1rem; font-weight: 900;
            letter-spacing: 2px; cursor: pointer; border-radius: 12px;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.2), inset 0 0 10px rgba(255, 215, 0, 0.1);
            transition: all 0.3s ease; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-nodo:hover, .btn-nodo:active {
            color: #fff; border-color: var(--bio-aqua); background: rgba(0, 240, 255, 0.15);
            box-shadow: 0 0 30px var(--bio-aqua), inset 0 0 15px var(--bio-aqua);
            text-shadow: 0 0 8px #fff, 0 0 15px var(--bio-aqua); transform: scale(1.03);
        }

        .efecto-wow-puerta {
            transform: scale(5) translateZ(0) !important; filter: brightness(3) contrast(1.5) blur(3px) !important;
        }

        #destello-luz {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #ffffff 10%, #ccffff 90%);
            z-index: 99999; opacity: 0; pointer-events: none;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1); mix-blend-mode: screen;
        }

        /* ========================================================= */

        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,255,136,0.03) 50%, rgba(0,255,136,0.03));
            background-size: 100% 8px; z-index: 9998; pointer-events: none;
            opacity: 1; animation: scrollScanlines 10s linear infinite;
        }
        @keyframes scrollScanlines { from { background-position: 0 0; } to { background-position: 0 100vh; } }

        .fireflies { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .firefly { position: absolute; border-radius: 50%; opacity: 0; animation: float-up linear infinite, parpadeo ease-in-out infinite alternate; }
        @keyframes float-up { 0% { transform: translateY(105vh) translateX(0); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-15vh) translateX(50px); opacity: 0; } }
        @keyframes parpadeo { 0% { opacity: 0.3; } 100% { opacity: 1; } }

        .header-raices { position: relative; z-index: 10; padding: 40px 15px 20px; text-align: center; }

        /* BOTÓN DE AUDIO */
        .btn-audio-toggle {
            position: absolute; top: 15px; left: 15px;
            background: rgba(0, 240, 255, 0.1); color: var(--bio-aqua); border: 1px solid var(--bio-aqua);
            width: 45px; height: 45px; border-radius: 50%; font-size: 1.2rem;
            cursor: pointer; z-index: 100; box-shadow: 0 0 10px rgba(0, 240, 255, 0.2); backdrop-filter: blur(5px);
            transition: 0.3s; display: flex; justify-content: center; align-items: center;
        }
        .btn-audio-toggle:hover { background: var(--bio-aqua); color: #000; box-shadow: 0 0 20px rgba(0, 240, 255, 0.6); }

        /* BOTÓN DE INSTALAR APP */
        .btn-instalar-app {
            position: absolute; top: 15px; right: 15px;
            background: rgba(0, 240, 255, 0.1); color: var(--bio-aqua); border: 1px solid var(--bio-aqua);
            padding: 8px 15px; border-radius: 8px; font-family: 'Orbitron', sans-serif; font-size: 0.8rem; font-weight: 700;
            cursor: pointer; z-index: 100; box-shadow: 0 0 10px rgba(0, 240, 255, 0.2); backdrop-filter: blur(5px);
            transition: 0.3s;
        }
        .btn-instalar-app:hover { background: var(--bio-aqua); color: #000; box-shadow: 0 0 20px rgba(0, 240, 255, 0.6); }

        .titulo-raices {
            font-family: 'Orbitron', sans-serif; font-size: 3rem; font-weight: 900;
            color: transparent; -webkit-text-stroke: 1.5px #b38600;
            background: linear-gradient(180deg, #fff 30%, var(--bio-oro));
            background-clip: text; -webkit-background-clip: text;
            text-shadow: 0 5px 25px rgba(0, 0, 0, 0.9); letter-spacing: 8px; margin-bottom: 5px;
        }

        /* BADGE INDICADOR DE SUCURSAL */
        .badge-nodo-actual {
            background: rgba(1, 10, 5, 0.85); border: 1px solid rgba(255, 215, 0, 0.5);
            color: var(--bio-oro); font-family: 'Orbitron', sans-serif; padding: 6px 15px;
            border-radius: 20px; display: inline-block; font-size: 0.85rem; letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.8), 0 0 10px rgba(255, 215, 0, 0.2); backdrop-filter: blur(5px);
            margin-top: 5px; margin-bottom: 15px; text-transform: uppercase;
        }

        .contenedor-categorias { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 20px 0 30px; z-index: 10; position: relative; }
        .categoria-badge { background: rgba(10, 5, 2, 0.85); color: rgba(255,255,255,0.9); padding: 10px 20px; border-radius: 8px; border: 2px solid rgba(255,215,0,0.4); font-weight: 700; letter-spacing: 2px; font-family: 'Orbitron', sans-serif; font-size: 0.8rem; text-transform: uppercase; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.8); backdrop-filter: blur(5px); }
        .categoria-badge.active { background: rgba(255, 215, 0, 0.2); color: var(--bio-oro); border-color: var(--bio-oro); box-shadow: var(--resplandor-divino); }

        .item-tarjeta { position: relative; z-index: 1; transition: z-index 0.2s; }
        .item-tarjeta:hover { z-index: 100; }

        .card-escena { perspective: 1000px; width: 100%; height: 400px; position: relative; margin-bottom: 20px; }
        .card-flipper { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-escena.flipped .card-flipper { transform: rotateY(180deg); }

        .card-front, .card-back { position: absolute; top: 0; left: 0; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px; border: 6px solid #3e2312; border-bottom-color: #1a0f07; border-right-color: #1a0f07; border-top-color: #5a361d; border-left-color: #5a361d; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.95), inset 0 0 30px rgba(0,0,0,0.9); backdrop-filter: blur(10px); }
        .card-front { background: linear-gradient(rgba(20, 10, 2, 0.7), rgba(20, 10, 2, 0.9)), url('https://www.transparenttextures.com/patterns/wood-burn-pattern.png'); padding: 20px 15px; justify-content: space-between; }
        .card-back { background: #0a0502; background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png'); transform: rotateY(180deg); padding: 30px 20px; border-color: var(--bio-oro); }

        .enredadera-magica { position: absolute; top: -12px; left: -12px; right: -12px; bottom: -12px; background-image: url('lianas-limpias.png'); background-size: 100% 100%; background-position: center; background-repeat: no-repeat; pointer-events: none; z-index: 15; }
        .card-escena.flipped .enredadera-magica { opacity: 0; transition: opacity 0.3s; }

        .img-zona { height: 180px; display: flex; justify-content: center; align-items: center; position: relative; z-index: 10; }
        .img-batido { width: 80%; height: 80%; object-fit: contain; z-index: 2; filter: drop-shadow(0 15px 25px rgba(0,0,0,1)); animation: flotar 4s infinite alternate ease-in-out; }
        @keyframes flotar { from { transform: translateY(5px); } to { transform: translateY(-5px); } }

        .nombre-prod { font-family: 'Rajdhani', sans-serif; font-size: 1.3rem; font-weight: 700; color: #fff; text-transform: uppercase; margin-bottom: 2px; text-shadow: 0 3px 8px #000, 0 0 15px rgba(0,0,0,0.9); text-align: center; position: relative; z-index: 25; }
        .precio-prod { font-family: 'Orbitron', sans-serif; color: var(--bio-oro); font-weight: 900; font-size: 1.4rem; text-shadow: 0 3px 8px #000, 0 0 15px rgba(0,0,0,0.9); text-align: center; position: relative; z-index: 25; }

        .btn-info-flip { position: absolute; top: 10px; right: 10px; background: rgba(5, 2, 0, 0.85); color: var(--bio-oro); border: 1px solid var(--bio-oro); width: auto; padding: 6px 14px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron', sans-serif; font-size: 0.75rem; font-weight: 700; letter-spacing: 1px; z-index: 30; box-shadow: 0 5px 10px rgba(0,0,0,0.8); backdrop-filter: blur(5px); cursor: pointer; transition: 0.3s; }
        .btn-info-flip:hover { background: var(--bio-oro); color: #000; }

        .btn-extraer { background: linear-gradient(135deg, rgba(255, 215, 0, 0.1) 0%, rgba(255, 215, 0, 0.3) 100%); color: var(--bio-oro); border: 1px solid var(--bio-oro); padding: 12px; border-radius: 8px; font-family: 'Orbitron', sans-serif; font-weight: 900; width: 100%; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.6); position: relative; z-index: 25;}

        .btn-disabled-pago { background: rgba(50, 50, 50, 0.5); color: rgba(255, 255, 255, 0.5); border: 1px dashed rgba(255, 255, 255, 0.3); padding: 12px; border-radius: 8px; font-family: 'Orbitron', sans-serif; font-weight: 900; width: 100%; text-transform: uppercase; letter-spacing: 2px; cursor: not-allowed; }

        .back-titulo { font-family: 'Orbitron'; color: var(--bio-oro); font-size: 1rem; border-bottom: 1px solid var(--bio-oro); padding-bottom: 10px; margin-bottom: 15px; text-align: center;}
        .back-desc { font-size: 0.95rem; color: #fff; line-height: 1.5; overflow-y: auto; text-align: left; padding-right: 5px; height: 160px; font-weight: 500;}
        .btn-cerrar-flip { position: absolute; top: 10px; right: 10px; color: #fff; background: none; border: none; font-size: 1.5rem; opacity: 0.7; cursor: pointer;}

        .carrito-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 95%; max-width: 400px; background: rgba(10, 5, 2, 0.98); border: 2px solid var(--bio-oro); padding: 12px 20px; border-radius: 12px; display: none; justify-content: space-between; align-items: center; box-shadow: 0 15px 40px rgba(0,0,0,0.9); z-index: 1000; cursor: pointer;}

        .modal-content { background: #0a0502; background-image: url('https://www.transparenttextures.com/patterns/wood-burn-pattern.png'); border: 2px solid var(--bio-oro); border-radius: 15px; color: white; }

        .input-bio { background: rgba(5, 2, 0, 0.8); border: 1px solid var(--bio-oro); color: #fff; font-family: 'Rajdhani', sans-serif; font-size: 1.1rem; border-radius: 8px; padding: 10px 15px; width: 100%; margin-bottom: 15px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.8); transition: all 0.3s ease; }
        .input-bio:focus { outline: none; border-color: var(--bio-aqua); box-shadow: 0 0 10px rgba(0, 240, 255, 0.3), inset 0 2px 5px rgba(0,0,0,0.8); }
        .input-bio::placeholder { color: rgba(255, 215, 0, 0.4); font-size: 0.95rem;}
        .label-bio { font-family: 'Orbitron', sans-serif; font-size: 0.75rem; color: var(--bio-aqua); margin-bottom: 5px; display: block; letter-spacing: 1px; font-weight: 700; }

        /* ESTILOS DEL BOTÓN DEL MICRÓFONO PARA CLIENTES */
        .btn-mic-flotante {
            position: fixed; bottom: 90px; right: 20px; width: 60px; height: 60px;
            border-radius: 50%; background: rgba(10, 20, 15, 0.85); border: 2px solid var(--bio-aqua);
            color: var(--bio-aqua); display: flex; justify-content: center; align-items: center;
            font-size: 1.8rem; cursor: pointer; z-index: 999; box-shadow: 0 0 20px rgba(0, 240, 255, 0.4);
            backdrop-filter: blur(10px); transition: all 0.3s ease;
        }
        .btn-mic-flotante:hover { transform: scale(1.1); background: var(--bio-aqua); color: #000; box-shadow: 0 0 30px rgba(0, 240, 255, 0.8); }
        .btn-mic-flotante.escuchando { animation: latidoMic 1s infinite; border-color: var(--bio-oro); color: var(--bio-oro); box-shadow: 0 0 30px var(--bio-oro); }
        @keyframes latidoMic { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div id="destello-luz"></div>
<div class="scanlines"></div>

<audio id="mainAudio" preload="auto" loop>
    <source src="audio_fondo.mp3" type="audio/mpeg">
</audio>

<audio id="sfxCash" preload="auto">
    <source src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_0625c1539c.mp3?filename=cash-register-purchase-87313.mp3" type="audio/mpeg">
</audio>

<div id="pantalla-inicio">
    <div id="fondo-puerta" class="fondo-puerta-viva"></div>
    <div class="contenido-inicio px-3" id="contenido-textos-inicio">
        <h1 style="font-family: 'Orbitron'; color: var(--bio-aqua); margin-bottom: 5px; font-size: 4rem; text-shadow: 0 0 30px rgba(0,0,0,0.9), 0 0 20px rgba(0, 240, 255, 0.8);">RAÍCES</h1>
        <p style="color: var(--bio-oro); font-family: 'Rajdhani'; letter-spacing: 6px; font-weight: 700; margin-bottom: 40px; text-shadow: 0 0 15px rgba(0,0,0,0.9);">B I O - N U T R I C I Ó N</p>

        <p style="color: var(--bio-aqua); font-family: 'Orbitron'; letter-spacing: 2px; margin-bottom: 20px; font-size: 0.95rem; text-shadow: 0 0 10px rgba(0,240,255,0.5);">SELECCIONA TU CÁPSULA VITAL</p>

        <div class="d-flex flex-column gap-3 w-100" style="max-width: 320px;">
            <button class="btn-nodo" onclick="iniciarExperiencia('Chile')">
                <span style="font-size: 1.5rem;">🇨🇱</span> NODO ANTOFAGASTA
            </button>
            <button class="btn-nodo" onclick="iniciarExperiencia('Colombia')">
                <span style="font-size: 1.5rem;">🇨🇴</span> NODO TULUÁ
            </button>
            <button class="btn-nodo" onclick="iniciarExperiencia('España')">
                <span style="font-size: 1.5rem;">🇪🇸</span> NODO MALLORCA
            </button>
        </div>
    </div>
</div>

<div class="fireflies" id="firefly-container"></div>

<div class="header-raices" id="main-content" style="display: none;">
    <button id="btn-audio-toggle" class="btn-audio-toggle" onclick="toggleAudio()" style="display: none;">
        <i class="bi bi-volume-up-fill" id="icono-audio"></i>
    </button>

    <button id="btnInstalarApp" class="btn-instalar-app" style="display: none;">
        <i class="bi bi-phone-vibrate"></i> APP
    </button>

    <h1 class="titulo-raices">RAÍCES</h1>

    <div id="display-nodo-actual" class="badge-nodo-actual">🇨🇱 NODO ANTOFAGASTA</div>
    <input type="hidden" id="sucursal-activa" value="Chile"> <div class="contenedor-categorias">
    <button class="categoria-badge active" onclick="filtrar('500 mls', this)">Elíxires</button>
    <button class="categoria-badge" onclick="filtrar('Packs', this)">Packs</button>
</div>

    <div class="container px-2">
        <div id="grid-menu" class="row g-3 mb-5 pb-5"></div>
    </div>
</div>

<button id="btn-mic-cliente" class="btn-mic-flotante" onclick="iniciarVozCliente()" style="display: none;" title="Hablar con el Biosistema">
    <i class="bi bi-mic"></i>
</button>

<div id="carrito-bar" class="carrito-bar" onclick="abrirModalCarrito()">
    <div class="d-flex flex-column">
        <span class="fw-bold" style="font-size: 0.75rem; color: var(--bio-aqua); font-family: 'Orbitron';">RESERVA VITAL (<span id="items-count">0</span>)</span>
        <span id="total-precio" style="font-size: 1.4rem; font-weight: 900; color: var(--bio-oro); font-family: 'Orbitron'; text-shadow: 0 2px 5px #000;">$0</span>
    </div>
    <button class="btn btn-warning fw-bold text-dark px-3 py-2" style="font-size: 0.9rem;" onclick="event.stopPropagation(); abrirModalCarrito()">EXTRAER</button>
</div>

<div class="modal fade" id="modalCarritoCliente" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header border-0 pb-0 pt-4 px-3">
                <h5 class="modal-title font-orbitron" style="color: var(--bio-oro); font-weight: 900; font-size: 1.1rem;"><i class="bi bi-box-seam me-2"></i> TRANSFERENCIA</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body px-3">
                <button id="btn-mic-modal" class="btn btn-outline-info w-100 mb-4 py-2 font-orbitron fw-bold" onclick="iniciarVozModal()" style="border-radius: 8px; border-color: var(--bio-aqua); color: var(--bio-aqua); letter-spacing: 1px;">
                    <i class="bi bi-mic-fill me-2"></i> DICTAR DATOS POR VOZ
                </button>

                <div class="datos-cliente mb-4 pb-3" style="border-bottom: 1px dashed rgba(255,215,0,0.3);">
                    <label class="label-bio">IDENTIFICACIÓN (NOMBRE)</label>
                    <input type="text" id="nombreCliente" class="input-bio" placeholder="Ej. Gabriel Gómez" autocomplete="name">

                    <label class="label-bio">COORDENADAS (DIRECCIÓN)</label>
                    <input type="text" id="direccionCliente" class="input-bio" placeholder="Ubicación de entrega" autocomplete="street-address">

                    <label class="label-bio">ENLACE COMUNICACIÓN (TELÉFONO)</label>
                    <input type="tel" id="telefonoCliente" class="input-bio" placeholder="Número de contacto" autocomplete="tel">
                </div>

                <label class="label-bio mb-3">ELÍXIRES EXTRAÍDOS</label>
                <div id="lista-carrito-modal" class="mb-2"></div>

                <div class="d-flex justify-content-between align-items-center mt-3 pt-3" style="border-top: 1px dashed rgba(255,215,0,0.3);">
                    <span style="font-family: 'Rajdhani'; font-size: 0.9rem;">TOTAL:</span>
                    <span id="total-modal-caja" style="color: var(--bio-oro); font-weight: 900; font-size: 1.5rem; font-family: 'Orbitron';">$0</span>
                </div>
            </div>

            <div class="modal-footer border-0 pt-0 pb-4 px-3">
                <div id="contenedor-botones-pago" class="w-100"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // ==========================================
    // LÓGICA DE INSTALACIÓN PWA (APP CELULAR)
    // ==========================================
    let eventoInstalacion;
    const btnInstalar = document.getElementById('btnInstalarApp');

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').then(reg => {
                console.log('PWA Lista');
            }).catch(err => console.log('Error PWA', err));
        });
    }

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        eventoInstalacion = e;
        if (btnInstalar) btnInstalar.style.display = 'block';
    });

    if (btnInstalar) {
        btnInstalar.addEventListener('click', async () => {
            if (eventoInstalacion) {
                eventoInstalacion.prompt();
                const resultado = await eventoInstalacion.userChoice;
                if (resultado.outcome === 'accepted') {
                    console.log('El usuario instaló la App RAÍCES');
                }
                eventoInstalacion = null;
                btnInstalar.style.display = 'none';
            }
        });
    }

    // ==========================================
    // ANIMACIÓN INICIAL, SELECCIÓN DE NODO Y AUDIO
    // ==========================================
    let mainAudio = document.getElementById('mainAudio');
    let cashSound = document.getElementById('sfxCash');

    function toggleAudio() {
        const icono = document.getElementById('icono-audio');
        if (mainAudio.paused) {
            mainAudio.play();
            icono.className = 'bi bi-volume-up-fill';
        } else {
            mainAudio.pause();
            icono.className = 'bi bi-volume-mute-fill';
        }
    }

    function iniciarExperiencia(paisSeleccionado) {
        // Guardar selección
        document.getElementById('sucursal-activa').value = paisSeleccionado;
        let displayBadge = '';
        if(paisSeleccionado === 'Chile') displayBadge = '🇨🇱 NODO ANTOFAGASTA';
        if(paisSeleccionado === 'Colombia') displayBadge = '🇨🇴 NODO TULUÁ';
        if(paisSeleccionado === 'España') displayBadge = '🇪🇸 NODO MALLORCA';
        document.getElementById('display-nodo-actual').innerText = displayBadge;

        // Efectos visuales
        const puerta = document.getElementById('fondo-puerta');
        const pantallaInicio = document.getElementById('pantalla-inicio');
        const textosInicio = document.getElementById('contenido-textos-inicio');
        const destello = document.getElementById('destello-luz');
        const btnMic = document.getElementById('btn-mic-cliente');
        const btnAudio = document.getElementById('btn-audio-toggle');

        textosInicio.style.transform = 'scale(0.8)';
        textosInicio.style.opacity = '0';

        puerta.classList.add('efecto-wow-puerta');

        mainAudio.play().catch(e => {
            console.error("Música bloquedada", e);
            document.getElementById('icono-audio').className = 'bi bi-volume-mute-fill';
        });

        setTimeout(() => { destello.style.opacity = '1'; }, 600);

        setTimeout(() => {
            pantallaInicio.style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            btnAudio.style.display = 'flex';
            if('webkitSpeechRecognition' in window) { btnMic.style.display = 'flex'; }
            cargarMenu();
        }, 1200);

        setTimeout(() => {
            destello.style.transition = 'opacity 1.5s ease-out';
            destello.style.opacity = '0';
        }, 1500);
    }

    function playCashSound() { cashSound.currentTime = 0; cashSound.play().catch(e => console.error(e)); }

    const containerL = document.getElementById('firefly-container');
    const colores = ['#ffd700', '#00ff88', '#00e5ff'];
    for(let i=0; i<40; i++) {
        let f = document.createElement('div'); f.className = 'firefly';
        let size = Math.random() * 4 + 2;
        f.style.width = size + 'px'; f.style.height = size + 'px';
        f.style.background = colores[Math.floor(Math.random() * colores.length)];
        f.style.boxShadow = `0 0 ${size*3}px ${size}px ${f.style.background}`;
        f.style.left = Math.random() * 100 + 'vw';
        f.style.animationDuration = (Math.random() * 8 + 8) + 's, ' + (Math.random() * 2 + 1) + 's';
        f.style.animationDelay = (Math.random() * 5) + 's, 0s';
        containerL.appendChild(f);
    }

    // ==========================================
    // LÓGICA DE MENÚ Y CARRITO
    // ==========================================
    let productosRaw = []; let carrito = []; let filtroActual = '500 mls'; let simboloActual = '$'; let modalCarritoCliente;

    window.addEventListener('DOMContentLoaded', () => { modalCarritoCliente = new bootstrap.Modal(document.getElementById('modalCarritoCliente')); });

    // Resetea el estado del asistente de voz del modal cuando lo cierran
    document.getElementById('modalCarritoCliente').addEventListener('hidden.bs.modal', function () {
        estadoModalVoz = 'LIBRE';
        window.speechSynthesis.cancel();
        if(recVozModal) recVozModal.stop();
    });

    async function cargarMenu() {
        const grid = document.getElementById('grid-menu'); const nodo = document.getElementById('sucursal-activa').value;
        grid.innerHTML = '<div class="col-12 text-center text-white py-5">Sincronizando con el Núcleo...</div>';
        try {
            const res = await fetch('/api/productos/sucursal/' + nodo);
            if(res.ok) { productosRaw = await res.json(); } else { productosRaw = []; }
            renderizar();
        } catch (e) { productosRaw = []; renderizar(); }
    }

    function renderizar() {
        const grid = document.getElementById('grid-menu'); grid.innerHTML = '';
        const nodo = document.getElementById('sucursal-activa').value; simboloActual = (nodo === "España") ? '€' : '$';

        let lista = productosRaw.filter(p => {
            if (!p.categoria) return false;
            const cat = p.categoria.toLowerCase(); const f = filtroActual.toLowerCase();
            return f === 'packs' ? (cat.includes('pack') || cat.includes('16')) : (cat.includes('500') || cat.includes('vaso'));
        });

        if (lista.length === 0) {
            lista = [{ id: 'test', nombre: 'ELÍXIR DE PRUEBA', precio: 15000, descripcion: '¡Sistema PWA de descarga a celular activado!', imagen: 'https://www.pngmart.com/files/10/Smoothie-PNG-Photos.png' }];
        }

        lista.forEach(p => {
            let desc = (p.descripcion || "").replace(/\n/g, '<br>'); let img = p.imagen || 'https://www.pngmart.com/files/10/Smoothie-PNG-Photos.png';
            grid.innerHTML += `
                <div class="col-12 col-md-6 col-lg-4 col-xl-3 item-tarjeta">
                    <div class="card-escena" id="card-${p.id}">
                        <div class="card-flipper">
                            <div class="card-front">
                                <div class="enredadera-magica"></div>
                                <button class="btn-info-flip" onclick="event.stopPropagation(); flip('${p.id}')">INFORMACIÓN <i class="bi bi-info-circle ms-2"></i></button>
                                <div class="img-zona"><img src="${img}" class="img-batido"></div>
                                <div><div class="nombre-prod text-truncate">${p.nombre}</div><div class="precio-prod">${simboloActual}${p.precio.toLocaleString('es-ES')}</div></div>
                                <button class="btn-extraer mt-3" onclick="event.stopPropagation(); agregar('${p.id}', '${p.nombre}', ${p.precio}, this)">EXTRAER</button>
                            </div>
                            <div class="card-back">
                                <button class="btn-cerrar-flip" onclick="flip('${p.id}')"><i class="bi bi-x-lg"></i></button>
                                <div class="back-titulo">BIO-ANÁLISIS</div><div class="back-desc">${desc}</div>
                                <button class="btn-extraer mt-auto" style="background:var(--bio-oro); color:#000;" onclick="flip('${p.id}')">CERRAR</button>
                            </div>
                        </div>
                    </div>
                </div>`;
        });
    }

    function flip(id) { document.getElementById(`card-${id}`).classList.toggle('flipped'); }
    function filtrar(cat, btn) { filtroActual = cat; document.querySelectorAll('.categoria-badge').forEach(b => b.classList.remove('active')); btn.classList.add('active'); renderizar(); }

    function agregar(id, nombre, precio, btn) {
        if(btn) {
            const originalHTML = btn.innerHTML; btn.innerHTML = '<i class="bi bi-check2"></i>'; btn.style.background = 'var(--bio-oro)'; btn.style.color = '#000';
            setTimeout(()=>{ btn.innerHTML = originalHTML; btn.style=''; }, 600);
        }
        carrito.push({ id, nombre, precio: Number(precio) }); actualizarCarrito();
    }

    function actualizarCarrito() {
        const bar = document.getElementById('carrito-bar');
        if(carrito.length > 0) { bar.style.display = 'flex'; document.getElementById('items-count').innerText = carrito.length; document.getElementById('total-precio').innerText = simboloActual + carrito.reduce((s, i) => s + i.precio, 0).toLocaleString('es-ES'); } else { bar.style.display = 'none'; }
    }

    function abrirModalCarrito() {
        playCashSound();
        if(carrito.length === 0) return;

        const cont = document.getElementById('lista-carrito-modal'); cont.innerHTML = '';
        carrito.forEach((i, idx) => { cont.innerHTML += `<div class="d-flex justify-content-between mb-2 p-2" style="border: 1px solid rgba(255,215,0,0.3); border-radius: 8px; font-size:0.9rem;"><span>${i.nombre}</span><b>${simboloActual}${i.precio.toLocaleString('es-ES')} <i class="bi bi-x-lg text-danger ms-2" style="cursor:pointer" onclick="eliminar(${idx}, event)"></i></b></div>`; });
        document.getElementById('total-modal-caja').innerText = document.getElementById('total-precio').innerText;

        // RENDERIZAR BOTONES DE PAGO SEGÚN SUCURSAL
        renderizarBotonesPagoModal();

        modalCarritoCliente.show();
    }

    function renderizarBotonesPagoModal() {
        const pais = document.getElementById('sucursal-activa').value;
        const container = document.getElementById('contenedor-botones-pago');
        let html = '';

        if (pais === 'Chile') {
            html = `<button type="button" class="btn-extraer w-100 py-3 mb-2" onclick="confirmarPedido('MercadoPago')">
                        PAGAR CON WEBPAY / TARJETAS <i class="bi bi-credit-card ms-1"></i>
                    </button>`;
        } else if (pais === 'Colombia') {
            html = `<button type="button" class="btn-disabled-pago mb-2" disabled>
                        PAGO COLOMBIA (PRÓXIMAMENTE) <i class="bi bi-lock ms-1"></i>
                    </button>`;
        } else if (pais === 'España') {
            html = `<button type="button" class="btn-disabled-pago mb-2" disabled>
                        PAGO ESPAÑA (PRÓXIMAMENTE) <i class="bi bi-lock ms-1"></i>
                    </button>`;
        }

        container.innerHTML = html;
    }

    function eliminar(idx, e) { e.stopPropagation(); carrito.splice(idx, 1); actualizarCarrito(); if(carrito.length > 0) { abrirModalCarrito(); } else { modalCarritoCliente.hide(); } }

    async function confirmarPedido(metodoPago) {
        const nombre = document.getElementById('nombreCliente').value.trim(); const direccion = document.getElementById('direccionCliente').value.trim(); const telefono = document.getElementById('telefonoCliente').value.trim();
        if(!nombre || !direccion || !telefono) { alert("Por favor, ingresa tu Identificación, Coordenadas y Enlace (Nombre, Dirección y Teléfono) para procesar la extracción."); return; }

        // Buscamos el botón dentro del contenedor para ponerle el loading
        const btn = document.querySelector('#contenedor-botones-pago button');
        const contenidoOriginal = btn.innerHTML;
        btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span> CONECTANDO NÚCLEO...`; btn.disabled = true;

        // El nombre de la sucursal ya no viene del select text, porque el select ya no existe.
        // Lo sacamos directamente del input oculto.
        const paisNombre = document.getElementById('sucursal-activa').value;
        const payload = { cliente: { nombre, direccion, telefono }, items: carrito, origen: 'Reserva Bio-Tech', pais: paisNombre };

        try {
            if (metodoPago === 'MercadoPago') {
                const resMp = await fetch('/api/pagos/mercadopago', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if (resMp.ok) {
                    const linkMercadoPago = await resMp.text();
                    await fetch(`/api/ventas?metodo=MercadoPago`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    carrito.forEach(item => fetch(`/api/inventario/vender?idProducto=${item.id}&cantidad=1`, { method: 'POST' }));
                    carrito = []; actualizarCarrito(); modalCarritoCliente.hide(); window.location.href = linkMercadoPago;
                } else { throw new Error("Fallo en servidor"); }
            }
        } catch (error) {
            setTimeout(() => { alert(`Simulando redirección a pago para: ${nombre}...\n(Servidor local no detectado)`); carrito = []; actualizarCarrito(); modalCarritoCliente.hide(); btn.innerHTML = contenidoOriginal; btn.disabled = false; }, 1500);
        }
    }

    // ==========================================
    // SISTEMA DE VOZ INTELIGENTE (CARRITO / GLOBAL)
    // ==========================================
    let recVozCliente = null;

    function hablarCliente(texto) {
        window.speechSynthesis.cancel();
        const voz = new SpeechSynthesisUtterance(texto);
        voz.lang = 'es-ES'; voz.rate = 1.0; voz.pitch = 1.1;
        window.speechSynthesis.speak(voz);
    }

    function iniciarVozCliente() {
        if (!('webkitSpeechRecognition' in window)) {
            alert("Tu navegador no soporta el reconocimiento de voz."); return;
        }

        const btnMic = document.getElementById('btn-mic-cliente');

        if(recVozCliente) recVozCliente.stop();

        recVozCliente = new webkitSpeechRecognition();
        recVozCliente.lang = 'es-ES';
        recVozCliente.continuous = false;
        recVozCliente.interimResults = false;

        recVozCliente.onstart = function() {
            btnMic.classList.add('escuchando');
        };

        recVozCliente.onresult = function(event) {
            const comandoRaw = event.results[0][0].transcript;
            procesarComandoCliente(comandoRaw);
        };

        recVozCliente.onend = function() {
            btnMic.classList.remove('escuchando');
        };

        recVozCliente.start();
    }

    function procesarComandoCliente(comandoRaw) {
        const normalizar = (str) => {
            if(!str) return "";
            return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
        };

        const comando = normalizar(comandoRaw);

        if (comando.includes("pagar") || comando.includes("cobrar") || comando.includes("ver carrito") || comando.includes("terminar")) {
            if(carrito.length > 0) {
                abrirModalCarrito();
                hablarCliente("Revisemos tu selección para proceder a la extracción.");
            } else {
                hablarCliente("Tu reserva vital está vacía. Añade elíxires primero.");
            }
            return;
        }

        if (comando.includes("limpiar") || comando.includes("borrar") || comando.includes("vaciar")) {
            if (carrito.length > 0) {
                carrito = []; actualizarCarrito(); hablarCliente("Tu reserva ha sido purgada.");
            }
            return;
        }

        let candidatos = productosRaw.filter(p => {
            if(!p.nombre) return false;
            return comando.includes(normalizar(p.nombre));
        });

        candidatos.sort((a, b) => b.nombre.length - a.nombre.length);
        let productoEncontrado = candidatos[0];

        if (productoEncontrado) {
            let btnElement = document.querySelector(`#card-${productoEncontrado.id} .btn-extraer`);
            agregar(productoEncontrado.id, productoEncontrado.nombre, productoEncontrado.precio, btnElement);
            hablarCliente("Excelente elección. He añadido " + productoEncontrado.nombre + " a tu reserva.");
        } else {
            hablarCliente("Lo siento, no pude identificar ese elíxir. Intenta pronunciar su nombre nuevamente.");
        }
    }

    // ==========================================
    // SISTEMA DE VOZ WIZARD (DENTRO DEL MODAL DATOS)
    // ==========================================
    let estadoModalVoz = 'LIBRE';
    let recVozModal = null;

    function hablarModal(texto, siguienteEstado) {
        window.speechSynthesis.cancel();
        estadoModalVoz = siguienteEstado || 'LIBRE';
        const voz = new SpeechSynthesisUtterance(texto);
        voz.lang = 'es-ES'; voz.rate = 1.0; voz.pitch = 1.1;

        if (siguienteEstado) {
            voz.onend = function() {
                setTimeout(iniciarReconocimientoModal, 300);
            };
        }
        window.speechSynthesis.speak(voz);
    }

    function iniciarVozModal() {
        hablarModal("Iniciando captura de datos. Por favor, dime tu nombre.", 'ESPERANDO_NOMBRE');
    }

    function iniciarReconocimientoModal() {
        if (!('webkitSpeechRecognition' in window)) return;
        if (recVozModal) recVozModal.stop();

        recVozModal = new webkitSpeechRecognition();
        recVozModal.lang = 'es-ES';
        recVozModal.continuous = false;
        recVozModal.interimResults = false;

        const btnMicModal = document.getElementById('btn-mic-modal');

        recVozModal.onstart = function() {
            btnMicModal.style.backgroundColor = 'rgba(255, 0, 0, 0.2)';
            btnMicModal.style.borderColor = '#ff4444';
            btnMicModal.style.color = '#ff4444';
            btnMicModal.innerHTML = '<i class="bi bi-mic-fill me-2" style="animation: latidoMic 1s infinite;"></i> ESCUCHANDO...';
        };

        recVozModal.onresult = function(event) {
            const comandoRaw = event.results[0][0].transcript;
            procesarComandoModal(comandoRaw);
        };

        recVozModal.onend = function() {
            btnMicModal.style.backgroundColor = 'transparent';
            btnMicModal.style.borderColor = 'var(--bio-aqua)';
            btnMicModal.style.color = 'var(--bio-aqua)';
            btnMicModal.innerHTML = '<i class="bi bi-mic-fill me-2"></i> DICTAR DATOS POR VOZ';
        };

        recVozModal.start();
    }

    function procesarComandoModal(comandoRaw) {
        if (estadoModalVoz === 'ESPERANDO_NOMBRE') {
            document.getElementById('nombreCliente').value = comandoRaw.toUpperCase();
            hablarModal("Nombre registrado. ¿Cuál es tu dirección de entrega?", 'ESPERANDO_DIRECCION');
        }
        else if (estadoModalVoz === 'ESPERANDO_DIRECCION') {
            document.getElementById('direccionCliente').value = comandoRaw.toUpperCase();
            hablarModal("Coordenadas guardadas. Finalmente, díctame tu número de teléfono.", 'ESPERANDO_TELEFONO');
        }
        else if (estadoModalVoz === 'ESPERANDO_TELEFONO') {
            document.getElementById('telefonoCliente').value = comandoRaw.replace(/\s/g, '');
            // Terminamos el flujo y le advertimos que el pago es manual por seguridad
            hablarModal("Datos completados. Por protocolos de seguridad, el método de pago debe seleccionarse de forma manual. Por favor, autoriza la transacción en pantalla.");
            estadoModalVoz = 'LIBRE';
        }
    }

</script>
</body>
</html>
