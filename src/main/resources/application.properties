# CONFIGURACION DE LA BASE DE DATOS (GOMEZ SYSTEMS ERP)
# La sintaxis ${VARIABLE:valor_local} usa la variable de la nube si existe, o tu dato local si est·s en tu PC.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:Linda236}

# CONFIGURACION DE HIBERNATE (EL TRADUCTOR)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# PUERTO DEL SERVIDOR
server.port=${PORT:8081}